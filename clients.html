<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Client Manager</title>

<link rel="stylesheet" href="assets/css/variables.css">
<link rel="stylesheet" href="assets/css/corporate.css">

</head>

<body>

<header class="topbar">

<div class="logo">

<img src="assets/images/logo.png">

<div>

<h1>TrainCapitalX</h1>

<p>Client Database</p>

</div>

</div>

</header>

<main>

<h2>Add Client</h2>

<form id="clientForm">

<input
id="clientName"
placeholder="Full Name"
required>

<input
id="clientEmail"
placeholder="Email"
required>

<input
id="clientPhone"
placeholder="Phone">

<button>

Save Client

</button>

</form>

<hr>

<h2>Client List</h2>

<table>

<thead>

<tr>

<th>Name</th>

<th>Email</th>

<th>Phone</th>

</tr>

</thead>

<tbody id="clientTable">

</tbody>

</table>

</main>

<script src="assets/js/client.js"></script>

<script>

const table =
document.getElementById("clientTable");

function load(){

table.innerHTML="";

ClientManager.getClients()
.forEach(c=>{

table.innerHTML +=`

<tr>

<td>${c.name}</td>

<td>${c.email}</td>

<td>${c.phone}</td>

</tr>

`;

});

}

document
.getElementById("clientForm")
.addEventListener("submit",e=>{

e.preventDefault();

ClientManager.add({

name:clientName.value,

email:clientEmail.value,

phone:clientPhone.value

});

clientForm.reset();

load();

});

load();

</script>

</body>

</html>
