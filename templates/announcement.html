<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Official Announcement - TrainCapitalX</title>

    <link rel="stylesheet" href="../assets/css/variables.css">
    <link rel="stylesheet" href="../assets/css/corporate.css">
    <link rel="stylesheet" href="../assets/css/forms.css">
    <link rel="stylesheet" href="../assets/css/print.css">
</head>

<header class="document-header">

    <img src="../assets/images/logo.png"
         alt="TrainCapitalX Logo"
         class="announcement-logo">

    <div class="header-text">
        <h1>TRAINCAPITALX</h1>
    <h2>OFFICIAL ANNOUNCEMENT</h2>
    <p class="notice-title">PUBLIC NOTICE</p>
    </div>

</header>

<section>

<div class="form-group">
    <label><strong></strong></label>
    <textarea rows="3"
    placeholder="Enter Mail"></textarea>
</div>

</div>

<section class="announcement-form">

    <div class="form-row">
        <div class="form-group">
            <label></label>
            <input type="text" placeholder="Reference Number">
        </div>

        <div class="form-group">
            <label>Date</label>
            <input type="date">
        </div>
    </div>

    <div class="form-group">
        <label>Contact</label>
        <textarea rows="3" placeholder="Enter mail"></textarea>
    </div>

    <div class="form-group">
        <label>Announcement Title</label>
        <input type="text" placeholder="Announcement Title">
    </div>

    <div class="form-group">
        <label>Dear</label>
        <input type="text" placeholder="Recipient">
    </div>

    <div class="form-group">
        <label>Announcement</label>
        <textarea rows="12"
        placeholder="Type the announcement here..."></textarea>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label>Effective Date</label>
            <input type="date">
        </div>

        <div class="form-group">
            <label>End Date</label>
            <input type="date">
        </div>
    </div>

    <div class="form-group">
        <label></label>
        <textarea rows="5"></textarea>
    </div>

    <div class="form-group">
        <label>Authorized Officer</label>
        <input type="text"
        placeholder="Officer Name">
    </div>

 <div class="signature-section">

    <div class="signature-box">

        <p><strong></strong></p>

        <div class="signature-line"></div>
        <input type="signaturebox" placeholder="sign">

        <input type="text" placeholder="Position">

        <input type="date">

    </div>

</section>

</div>

<div>

<p><strong></strong></p>

<img src="../assets/images/company seal.jpg"
     class="company-seal-image"
     alt="Company Seal">

</div>

</section>

<div id="footer"></div>

<script>
fetch("../components/footer.html")
.then(response => response.text())
.then(data => {
document.getElementById("footer").innerHTML = data;
});
</script>

<body>
    
<script src="../assets/js/app.js"></script>
<div class="print-controls">
    <button onclick="window.print()">🖨 Print</button>
</div>
    
</body>

<script src="../assets/js/app.js"></script>
<script src="../assets/js/autofill.js"></script>
<script src="../assets/js/numbering.js"></script>
<script src="../assets/js/branding.js"></script>
<script src="../assets/js/print.js"></script>
    
</html>
