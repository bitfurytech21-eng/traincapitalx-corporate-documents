<!--
==================================================
TrainCapitalX Corporate Header
Reusable Component
==================================================
-->

<header class="document-header">

    <div class="header-left">

        <img
            src="../assets/images/logo.png"
            alt="TrainCapitalX Logo"
            class="company-logo">

    </div>

    <div class="header-center">

        <h1 class="brand-company">
            TrainCapitalX
        </h1>

        <p class="brand-slogan">
            Professional Investment & Corporate Documentation
        </p>

        <p>
            Website:
            <span class="brand-website">
                https://traincapitalx.com
            </span>
        </p>

        <p>
            Email:
            <span class="brand-email">
                info@traincapitalx.com
            </span>
        </p>

    </div>

    <div class="header-right">

        <table class="reference-table">

            <tr>
                <th>Reference</th>
            </tr>

            <tr>
                <td class="document-reference"></td>
            </tr>

            <tr>
                <th>Date</th>
            </tr>

            <tr>
                <td class="current-date"></td>
            </tr>

        </table>

    </div>

</header>

<hr class="header-divider">
